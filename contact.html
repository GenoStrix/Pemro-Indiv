<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - Genos.Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lato:wght@300;400;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>

  <body>
    <nav class="navbar">
      <div class="nav-brand">
        <a href="index.html" class="nav-brand"><b>Genos.Pro</b></a>
      </div>
      <div class="nav-links">
        <a href="index.html"><b>Home</b></a>
        <a href="gallery.html"><b>Gallery</b></a>
        <a href="blog.html"><b>Blog</b></a>
        <a href="contact.html"><b>Contact</b></a>
      </div>
      <div class="nav-spacer">&nbsp;</div>
    </nav>

    <div class="contact-section">
      <h1 class="contact-title">Contact Me</h1>
      <p style="font-family: &quot;Lato&quot;, sans-serif">
        Hubungi saya melalui platform di bawah ini:
      </p>

      <div class="contact-links">
        <a href="https://instagram.com/glennsumbaluwu" target="_blank">
          <img
            src="https://cdn-icons-png.flaticon.com/512/174/174855.png"
            width="30"
            alt="Instagram"
          />
          <b>@glennsumbaluwu</b>
        </a>

        <a href="mailto:glennsumbaluwu026@student.unsrat.ac.id">
          <img
            src="https://cdn-icons-png.flaticon.com/512/732/732200.png"
            width="30"
            alt="Email"
          />
          <b>glennsumbaluwu026@student.unsrat.ac.id</b>
        </a>
      </div>
    </div>

    <div class="form-container">
      <div class="contact-form">
        <form id="contactForm">
          <label><b>Email Anda:</b></label>
          <input
            type="email"
            name="user_email"
            class="form-input"
            placeholder="Masukkan email aktif.."
            required
          />

          <label><b>Pesan:</b></label>
          <textarea
            name="user_message"
            class="form-input"
            placeholder="Tulis pesan kamu di sini.."
            rows="5"
            required
          ></textarea>

          <button type="submit" class="btn-submit">Kirim Pesan</button>
        </form>
      </div>
    </div>
  </body>
</html>
