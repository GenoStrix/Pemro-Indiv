<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Genos.Pro - Contact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- NAVBAR -->
    <nav class="navbar">
      <div class="navbar-brand">
        <a href="index.html" class="navbar-logo">Genos.Pro</a>
      </div>
      <div class="navbar-links">
        <a href="index.html"><b>Home</b></a>
        <a href="gallery.html"><b>Gallery</b></a>
        <a href="blog.html"><b>Blog</b></a>
        <a href="contact.html"><b>Contact</b></a>
      </div>
      <div class="hamburger"><span></span><span></span><span></span></div>
      <div class="navbar-spacer">&nbsp;</div>
    </nav>

    <!-- CONTACT SECTION -->
    <section class="contact-section">
      <div class="contact-header">
        <h1>Contact Me</h1>
        <p>Hubungi saya melalui platform di bawah ini:</p>

        <div class="contact-social">
          <a href="https://instagram.com/glennsumbaluwu" target="_blank">
            <img
              src="https://cdn-icons-png.flaticon.com/512/174/174855.png"
              alt="Instagram"
            />
            @glennsumbaluwu
          </a>
          <a href="mailto:glennsumbaluwu026@student.unsrat.ac.id">
            <img
              src="https://cdn-icons-png.flaticon.com/512/732/732200.png"
              alt="Email"
            />
            glennsumbaluwu026@student.unsrat.ac.id
          </a>
        </div>
      </div>

      <div class="contact-form-wrapper">
        <div class="contact-card">
          <form>
            <label>Email Anda:</label><br />
            <input
              type="email"
              name="user_email"
              placeholder="Masukkan email aktif.."
            />

            <br /><br />

            <label>Pesan:</label><br />
            <textarea
              name="user_message"
              placeholder="Tulis pesan kamu di sini.."
              rows="5"
            ></textarea>

            <br />

            <button type="submit" class="btn-submit">Kirim Pesan</button>
          </form>
        </div>
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
